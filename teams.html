<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HPL 2026 — Teams</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏏</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>


/* ─── DESIGN TOKENS ──────────────────────────────────────────────────────── */
:root {
  /* IPL-inspired palette */
  --navy:        #0A0E1A;
  --navy-mid:    #0F1525;
  --navy-card:   #141929;
  --navy-panel:  #1A2035;
  --navy-input:  #1F2640;
  --navy-border: rgba(255,255,255,0.07);
  --navy-border-bright: rgba(255,255,255,0.15);

  --blue:        #0057FF;
  --blue-bright: #1A6BFF;
  --blue-glow:   rgba(0,87,255,0.25);
  --blue-dim:    rgba(0,87,255,0.12);

  --teal:        #00C2CB;
  --gold:        #FFB800;
  --gold-dim:    rgba(255,184,0,0.15);
  --red:         #FF3B3B;
  --green:       #00D68F;
  --amber:       #FF9500;

  --white:       #FFFFFF;
  --text:        #E8ECF4;
  --text-muted:  #6B7A99;
  --text-dim:    #3A4460;

  /* Category colours */
  --cat-a: #FF3B3B;
  --cat-b: #0057FF;
  --cat-c: #00C2CB;

  /* Sponsor tier colours */
  --tier-title:    #FFB800;
  --tier-platinum: #C8D8E8;
  --tier-gold:     #FFB800;
  --tier-silver:   #8899BB;
  --tier-catering: #00C2CB;
}

/* ─── RESET & BASE ───────────────────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
/* height:100% removed for setup page scroll */
body {
  font-family: 'Barlow', sans-serif;
  background: var(--navy);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Subtle grid texture overlay */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(0,87,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,87,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ─── SCROLLBAR ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--text-dim); border-radius:2px; }

/* ─── NAV ────────────────────────────────────────────────────────────────── */
.nav {
  position: sticky; top:0; z-index:200;
  display: flex; align-items: stretch;
  height: 58px;
  background: var(--navy-card);
  border-bottom: 2px solid var(--blue);
  box-shadow: 0 4px 24px rgba(0,87,255,0.15);
}

.nav-logo {
  display: flex; align-items: center;
  padding: 0 20px;
  border-right: 1px solid var(--navy-border);
  position: relative;
}
.nav-logo::after {
  content:'';
  position:absolute; right:-1px; top:20%; bottom:20%;
  width:2px; background:var(--blue);
}
.nav-logo img { height:32px; width:auto; }

.nav-tabs { display:flex; flex:1; }
.nav-tab {
  display: flex; align-items: center; gap:8px;
  padding: 0 24px;
  font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  border-right: 1px solid var(--navy-border);
  transition: all 0.2s;
  position: relative;
}
.nav-tab:hover { color:var(--text); background:rgba(255,255,255,0.03); }
.nav-tab.active {
  color: var(--white);
  border-bottom-color: var(--blue);
  background: var(--blue-dim);
}
.nav-tab.active::before {
  content:'';
  position:absolute; bottom:-3px; left:50%; transform:translateX(-50%);
  width:6px; height:6px; border-radius:50%; background:var(--blue);
}

.live-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--red);
  box-shadow: 0 0 8px var(--red);
  animation: pulse 1.4s infinite;
  flex-shrink:0;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

.nav-badge {
  margin-left:auto; margin-right:16px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px; font-weight:700; letter-spacing:2px;
  color:var(--gold);
  display:flex; align-items:center; gap:6px;
}
.nav-badge-dot { width:6px; height:6px; border-radius:50%; background:var(--gold); animation:pulse 2s infinite; }

/* ─── PAGE SHELL ─────────────────────────────────────────────────────────── */
.page { display:none; position:relative; z-index:1; }
.page.active { display:block; }

/* ─── SHARED COMPONENTS ──────────────────────────────────────────────────── */

/* Section label */
.section-eyebrow {
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase;
  color:var(--blue);
  display:flex; align-items:center; gap:8px; margin-bottom:14px;
}
.section-eyebrow::before {
  content:''; width:20px; height:2px; background:var(--blue); flex-shrink:0;
}

/* Card */
.card {
  background:var(--navy-card);
  border:1px solid var(--navy-border);
  border-radius:10px;
  overflow:hidden;
}
.card-head {
  padding:14px 18px;
  border-bottom:1px solid var(--navy-border);
  display:flex; align-items:center; justify-content:space-between;
}
.card-head-title {
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:var(--text-muted);
}
.card-

/* Blue accent card */
.card-accent { border-top:2px solid var(--blue); }
.card-accent-gold { border-top:2px solid var(--gold); }
.card-accent-red { border-top:2px solid var(--red); }

/* Inputs */
.form-label {
  font-size:11px; font-weight:500; letter-spacing:0.5px;
  color:var(--text-muted); margin-bottom:5px; display:block;
}
.form-input {
  width:100%; background:var(--navy-input);
  border:1px solid var(--navy-border); border-radius:7px;
  padding:9px 13px; color:var(--text);
  font-family:'Barlow',sans-serif; font-size:13px;
  transition:border-color 0.2s;
}
.form-input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-dim); }
textarea.form-input { resize:vertical; font-family:'DM Mono',monospace; font-size:11.5px; line-height:1.7; }
select.form-input option { background:var(--navy-input); }

/* Buttons */
.btn {
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 18px; border-radius:7px; border:none; cursor:pointer;
  font-family:'Barlow',sans-serif; font-weight:600; font-size:13px;
  letter-spacing:0.3px; transition:all 0.18s;
}
.btn-blue {
  background:var(--blue); color:var(--white);
  box-shadow:0 4px 16px var(--blue-glow);
}
.btn-blue:hover { background:var(--blue-bright); transform:translateY(-1px); box-shadow:0 6px 20px var(--blue-glow); }
.btn-outline {
  background:transparent; border:1px solid var(--navy-border-bright);
  color:var(--text);
}
.btn-outline:hover { background:rgba(255,255,255,0.06); }
.btn-ghost {
  background:rgba(255,255,255,0.04); border:1px solid var(--navy-border);
  color:var(--text-muted);
}
.btn-ghost:hover { background:rgba(255,255,255,0.08); color:var(--text); }
.btn-danger { background:rgba(255,59,59,0.12); border:1px solid rgba(255,59,59,0.25); color:var(--red); }
.btn-danger:hover { background:rgba(255,59,59,0.2); }
.btn-success { background:rgba(0,214,143,0.12); border:1px solid rgba(0,214,143,0.3); color:var(--green); }
.btn-sm { padding:6px 13px; font-size:11px; }
.btn-full { width:100%; justify-content:center; }
.btn-lg {
  padding:13px 22px; font-size:14px; font-weight:700; letter-spacing:0.5px;
  border-radius:8px;
}

/* Tags */
.tag {
  display:inline-flex; align-items:center;
  padding:2px 8px; border-radius:4px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
}
.tag-a { background:rgba(255,59,59,0.15); color:var(--cat-a); border:1px solid rgba(255,59,59,0.2); }
.tag-b { background:rgba(0,87,255,0.15); color:#5588FF; border:1px solid rgba(0,87,255,0.2); }
.tag-c { background:rgba(0,194,203,0.15); color:var(--cat-c); border:1px solid rgba(0,194,203,0.2); }

/* Status badges */
.badge-live { background:rgba(255,59,59,0.15); color:var(--red); border:1px solid rgba(255,59,59,0.3); padding:2px 8px; border-radius:4px; font-size:9px; font-weight:700; letter-spacing:2px; }

/* Alert */
.alert { padding:10px 14px; border-radius:7px; font-size:12px; }
.alert-warn { background:rgba(255,149,0,0.1); border:1px solid rgba(255,149,0,0.25); color:var(--amber); }
.alert-ok { background:rgba(0,214,143,0.1); border:1px solid rgba(0,214,143,0.25); color:var(--green); }
.alert-blue { background:var(--blue-dim); border:1px solid rgba(0,87,255,0.25); color:#7AABFF; }

/* Divider */
.divider { height:1px; background:var(--navy-border); }

/* Progress bar */
.prog-bar { height:3px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; border-radius:2px; transition:width 0.4s ease; }

/* CSV upload */
.csv-upload-btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 13px; border-radius:6px; cursor:pointer;
  font-size:11px; font-weight:500;
  background:rgba(0,87,255,0.08); border:1px solid rgba(0,87,255,0.25);
  color:#7AABFF; transition:all 0.18s; user-select:none;
}
.csv-upload-btn:hover { background:rgba(0,87,255,0.16); }
.csv-preview {
  margin-top:8px; background:var(--navy-panel); border:1px solid var(--navy-border);
  border-radius:7px; overflow:hidden; display:none;
}
.csv-preview-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:7px 12px; border-bottom:1px solid var(--navy-border);
  font-size:10px; letter-spacing:1px; color:var(--text-muted); text-transform:uppercase;
}
.csv-preview-
.csv-row-ok { color:var(--text); }
.csv-row-warn { color:var(--amber); }

/* Hint box */
.hint-box {
  background:var(--navy-panel); border:1px solid var(--navy-border); border-left:2px solid var(--blue);
  border-radius:0 7px 7px 0; padding:10px 13px; margin-bottom:10px;
  font-size:11px; color:var(--text-muted); font-family:'DM Mono',monospace; line-height:1.9;
}
.hint-box strong { color:#7AABFF; }

/* ─── SETUP PAGE ─────────────────────────────────────────────────────────── */
.setup-wrap { max-width:1160px; margin:0 auto; padding:28px 24px; }
.setup-page-head {
  margin-bottom:28px;
  display:flex; align-items:flex-end; justify-content:space-between;
}
.setup-page-head h1 {
  font-family:'Barlow Condensed',sans-serif;
  font-size:36px; font-weight:900; letter-spacing:1px; line-height:1;
  text-transform:uppercase;
}
.setup-page-head h1 span { color:var(--blue); }
.setup-page-head p { color:var(--text-muted); font-size:13px; margin-top:4px; }
.setup-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.count-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
.count-card {
  background:var(--navy-panel); border-radius:7px; padding:12px;
  text-align:center; border:1px solid var(--navy-border);
}
.count-num { font-family:'Barlow Condensed',sans-serif; font-size:34px; font-weight:800; }
.count-lbl { font-size:9px; color:var(--text-muted); letter-spacing:1.5px; text-transform:uppercase; margin-top:2px; }
.settings-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:14px; }

/* Image manager */
.img-manager { display:flex; flex-direction:column; gap:5px; max-height:280px; overflow-y:auto; }
.img-row {
  display:flex; align-items:center; gap:9px;
  background:var(--navy-panel); border-radius:6px; padding:7px 10px;
  border:1px solid transparent; transition:border-color 0.15s;
}
.img-row:hover { border-color:var(--navy-border); }
.img-thumb { width:36px; height:36px; border-radius:5px; object-fit:cover; }
.img-ph {
  width:36px; height:36px; border-radius:5px;
  background:var(--navy-input); border:1px dashed var(--navy-border-bright);
  display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; flex-shrink:0;
}
.img-name { flex:1; font-size:12px; }
.img-up-btn {
  font-size:9px; font-weight:600; letter-spacing:0.5px; padding:3px 8px;
  background:rgba(0,87,255,0.08); border:1px solid rgba(0,87,255,0.2);
  border-radius:4px; color:#7AABFF; cursor:pointer;
}
.img-up-btn:hover { background:rgba(0,87,255,0.16); }

/* Sponsor slots */
.sponsor-tier-section { margin-bottom:16px; }
.sponsor-tier-label {
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  margin-bottom:8px; padding:3px 10px; border-radius:4px; display:inline-block;
}
.stl-title    { color:var(--tier-title);    background:rgba(255,184,0,0.1);    border:1px solid rgba(255,184,0,0.25); }
.stl-platinum { color:var(--tier-platinum); background:rgba(200,216,232,0.08); border:1px solid rgba(200,216,232,0.2); }
.stl-gold     { color:var(--tier-gold);     background:rgba(255,184,0,0.08);   border:1px solid rgba(255,184,0,0.2); }
.stl-silver   { color:var(--tier-silver);   background:rgba(136,153,187,0.08); border:1px solid rgba(136,153,187,0.2); }
.stl-catering { color:var(--tier-catering); background:rgba(0,194,203,0.08);   border:1px solid rgba(0,194,203,0.2); }
.sponsor-slots { display:grid; gap:7px; }
.sponsor-slot {
  display:flex; align-items:center; gap:10px;
  background:var(--navy-panel); border-radius:7px; padding:8px 12px;
  border:1px solid var(--navy-border);
}
.spon-img-ph {
  width:44px; height:32px; border-radius:4px;
  background:var(--navy-input); border:1px dashed var(--navy-border-bright);
  display:flex; align-items:center; justify-content:center;
  font-size:8px; letter-spacing:0.5px; color:var(--text-dim); cursor:pointer; flex-shrink:0;
}
.spon-img-ph:hover { border-color:var(--blue); }
.spon-img { width:44px; height:32px; border-radius:4px; object-fit:contain; background:var(--navy-input); flex-shrink:0; }
.spon-name-input {
  flex:1; background:var(--navy-input); border:1px solid var(--navy-border);
  border-radius:5px; padding:5px 9px; color:var(--text); font-size:12px; font-family:'Barlow',sans-serif;
}
.spon-name-input:focus { outline:none; border-color:var(--blue); }
.spon-up-lbl {
  font-size:9px; font-weight:600; padding:3px 7px;
  background:rgba(0,87,255,0.08); border:1px solid rgba(0,87,255,0.2);
  border-radius:4px; color:#7AABFF; cursor:pointer; white-space:nowrap;
}
.spon-up-lbl:hover { background:rgba(0,87,255,0.16); }

/* ─── ADMIN PAGE ─────────────────────────────────────────────────────────── */
.admin-layout { display:grid; grid-template-columns:290px 1fr; height:calc(100vh - 58px); overflow:hidden; }
.admin-sidebar {
  background:var(--navy-card); border-right:1px solid var(--navy-border);
  overflow-y:auto; display:flex; flex-direction:column;
}
.admin-main { overflow-y:auto; padding:18px; background:var(--navy); }

/* Sidebar sections */
.sb-section { padding:14px 15px; border-bottom:1px solid var(--navy-border); }
.sb-lbl {
  font-family:'Barlow Condensed',sans-serif;
  font-size:9px; font-weight:700; letter-spacing:3px; text-transform:uppercase;
  color:var(--text-dim); margin-bottom:10px;
}

/* Category phase buttons */
.phase-row { display:flex; gap:5px; }
.phase-btn {
  flex:1; padding:8px 4px; border-radius:6px; border:none; cursor:pointer;
  font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:800;
  letter-spacing:1.5px; text-transform:uppercase; transition:all 0.15s;
}
.phase-btn-a { background:rgba(255,59,59,0.1); border:1px solid rgba(255,59,59,0.25); color:var(--cat-a); }
.phase-btn-b { background:rgba(0,87,255,0.1);  border:1px solid rgba(0,87,255,0.25);  color:#5588FF; }
.phase-btn-c { background:rgba(0,194,203,0.1); border:1px solid rgba(0,194,203,0.25); color:var(--cat-c); }
.phase-btn:hover { filter:brightness(1.3); transform:translateY(-1px); }
.phase-btn.active-phase { box-shadow:0 0 12px currentColor; }

/* Auction status */
.auction-status-box {
  background:var(--navy-panel); border-radius:7px; padding:10px 12px;
  margin-top:9px; border:1px solid var(--navy-border);
}
.cat-badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 10px; border-radius:4px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
}
.badge-a { background:rgba(255,59,59,0.15); color:var(--cat-a); border:1px solid rgba(255,59,59,0.25); }
.badge-b { background:rgba(0,87,255,0.15);  color:#5588FF;      border:1px solid rgba(0,87,255,0.25); }
.badge-c { background:rgba(0,194,203,0.15); color:var(--cat-c); border:1px solid rgba(0,194,203,0.25); }

/* Current player card in admin */
.cp-card {
  background:var(--navy-panel); border:1px solid var(--navy-border-bright);
  border-radius:8px; padding:12px; display:flex; gap:11px; align-items:flex-start;
}
.cp-img { width:52px; height:52px; border-radius:6px; object-fit:cover; background:var(--navy-input); flex-shrink:0; }
.cp-img-ph {
  width:52px; height:52px; border-radius:6px; background:var(--navy-input);
  border:1px solid var(--navy-border); display:flex; align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0;
}
.cp-name {
  font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800;
  letter-spacing:0.5px; color:var(--white); line-height:1.1;
}
.cp-detail { font-size:11px; color:var(--text-muted); margin-top:2px; }

/* Bid input */
.bid-input {
  width:100%; background:var(--navy-input); border:1px solid var(--navy-border);
  border-radius:7px; padding:9px 12px; color:var(--white);
  font-family:'DM Mono',monospace; font-size:20px; font-weight:500;
  transition:border-color 0.2s;
}
.bid-input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-dim); }
.cap-sel {
  width:100%; background:var(--navy-input); border:1px solid var(--navy-border);
  border-radius:7px; padding:8px 11px; color:var(--text);
  font-size:12px; font-family:'Barlow',sans-serif;
}
.cap-sel:focus { outline:none; border-color:var(--blue); }

/* Queue */
.queue-list { display:flex; flex-direction:column; gap:2px; }
.queue-item {
  display:flex; align-items:center; gap:8px;
  padding:7px 10px; border-radius:6px; cursor:pointer;
  transition:all 0.12s; border:1px solid transparent;
}
.queue-item:hover { background:rgba(255,255,255,0.04); border-color:var(--navy-border); }
.queue-item.selected { background:var(--blue-dim); border-color:rgba(0,87,255,0.3); }
.queue-item.sold { opacity:0.3; pointer-events:none; }
.q-thumb { width:28px; height:28px; border-radius:4px; object-fit:cover; background:var(--navy-panel); flex-shrink:0; }
.q-num { font-size:9px; color:var(--text-dim); font-family:'DM Mono',monospace; min-width:18px; }
.q-name { flex:1; font-size:12px; font-weight:500; }

/* Teams grid */
.teams-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }

/* Team card */
.team-card { background:var(--navy-card); border:1px solid var(--navy-border); border-radius:10px; overflow:hidden; }
.team-card-stripe { height:3px; }
.team-header { padding:11px 14px; border-bottom:1px solid var(--navy-border); display:flex; justify-content:space-between; align-items:flex-start; }
.team-name {
  font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:800;
  letter-spacing:0.5px; color:var(--white); text-transform:uppercase;
}
.team-cap-lbl { font-size:10px; color:var(--text-muted); margin-top:1px; }
.team-bal-num { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; text-align:right; }
.team-bal-lbl { font-size:8px; color:var(--text-muted); letter-spacing:0.5px; text-align:right; }

.slots-fill { height:100%; border-radius:1px; background:var(--blue); transition:width 0.4s; }
.team-players { padding:0 14px 12px; }
.tp-row { display:flex; align-items:center; gap:6px; padding:3px 0; border-bottom:1px solid rgba(255,255,255,0.03); }

.tp-mini-img { width:20px; height:20px; border-radius:3px; object-fit:cover; background:var(--navy-panel); flex-shrink:0; }

.tp-price { font-family:'DM Mono',monospace; font-size:9px; color:var(--text-muted); }
.empty-slot { font-size:10px; color:var(--text-dim); font-style:italic; padding:3px 0; display:block; }

/* Budget item in sidebar */

.cb-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:2px; }
.cb-name { font-size:12px; font-weight:600; }
.cb-bal { font-family:'DM Mono',monospace; font-size:10px; }
.cb-sub { font-size:9px; color:var(--text-muted); margin-bottom:4px; }

/* ─── PRESENTATION PAGE ───────────────────────────────────────────────────── */
.pres-page {
  height: calc(100vh - 58px);
  display: flex; flex-direction: column;
  background: var(--navy);
  overflow: hidden;
  position: relative;
}

/* Ambient glow blobs */
.pres-page::before {
  content:'';
  position:absolute; top:-20%; left:-10%; width:500px; height:500px;
  background:radial-gradient(ellipse, rgba(0,87,255,0.08) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}
.pres-page::after {
  content:'';
  position:absolute; bottom:10%; right:-5%; width:400px; height:400px;
  background:radial-gradient(ellipse, rgba(0,194,203,0.06) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}

/* Top bar */
.pres-top {
  display:grid; grid-template-columns:220px 1fr 220px;
  align-items:center; padding:12px 32px;
  border-bottom:1px solid var(--navy-border);
  background:rgba(10,14,26,0.9); backdrop-filter:blur(10px);
  position:relative; z-index:10; flex-shrink:0;
}
.pres-logo img { height:38px; width:auto; }
.pres-center { text-align:center; }
.pres-cat-eyebrow {
  font-family:'Barlow Condensed',sans-serif;
  font-size:9px; font-weight:700; letter-spacing:3px; color:var(--text-dim); text-transform:uppercase;
}
.pres-cat-val {
  font-family:'Barlow Condensed',sans-serif;
  font-size:26px; font-weight:900; letter-spacing:3px; text-transform:uppercase; margin-top:2px;
}
.pres-right { display:flex; gap:24px; justify-content:flex-end; }
.pres-stat { text-align:right; }
.pres-stat-num {
  font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:800;
  color:var(--white); letter-spacing:1px;
}
.pres-stat-lbl { font-size:8px; color:var(--text-muted); letter-spacing:1.5px; text-transform:uppercase; }

/* Main spotlight */
.pres-spotlight {
  flex:1; display:grid; grid-template-columns:5fr 4fr;
  position:relative; z-index:5; min-height:0;
}

/* Player side */
.pres-player-side {
  padding:28px 36px; display:flex; gap:32px; align-items:flex-start;
  border-right:1px solid var(--navy-border);
  position:relative; overflow:hidden;
}

/* Diagonal accent stripe behind player photo */
.pres-player-side::before {
  content:''; position:absolute;
  top:-40px; left:-60px; width:320px; height:130%;
  background:linear-gradient(135deg, var(--blue-dim) 0%, transparent 60%);

}

.pres-player-img-wrap { flex-shrink:0; position:relative; z-index:2; }
.pres-player-img {
  width:160px; height:210px; object-fit:cover; border-radius:10px;
  border:2px solid rgba(0,87,255,0.4);
  box-shadow:0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px var(--navy-border);
}
.pres-player-img-ph {
  width:160px; height:210px; border-radius:10px;
  border:2px dashed rgba(0,87,255,0.3);
  background:var(--navy-card); display:flex; align-items:center; justify-content:center; font-size:52px;
}

.pres-player-text { flex:1; position:relative; z-index:2; padding-top:8px; }
.pres-p-group {
  font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700;
  letter-spacing:3px; color:var(--blue); text-transform:uppercase; margin-bottom:6px;
  display:flex; align-items:center; gap:8px;
}
.pres-p-group::before { content:''; width:16px; height:2px; background:var(--blue); }
.pres-p-num { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:600; letter-spacing:2px; color:var(--text-dim); margin-bottom:4px; }
.pres-p-name {
  font-family:'Barlow Condensed',sans-serif; font-size:60px; font-weight:900;
  letter-spacing:1px; line-height:0.88; color:var(--white);
  text-transform:uppercase; margin-bottom:22px;
}
.pres-d-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.pres-d-lbl {
  font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700;
  letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; width:50px; flex-shrink:0;
}
.pres-d-val { font-size:14px; color:var(--text); font-weight:500; }

/* Bid side */
.pres-bid-side {
  padding:28px 36px; display:flex; flex-direction:column; justify-content:center;
  position:relative; overflow:hidden;
}
.pres-bid-side::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(160deg, rgba(0,87,255,0.04) 0%, transparent 60%);
  pointer-events:none;
}

.pres-bid-eyebrow {
  font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700;
  letter-spacing:3px; color:var(--text-dim); text-transform:uppercase; margin-bottom:6px;
}
.pres-bid-num {
  font-family:'Barlow Condensed',sans-serif; font-size:96px; font-weight:900;
  letter-spacing:-1px; line-height:1; color:var(--white);
  position:relative; z-index:2;
}
.pres-bid-unit {
  font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700;
  letter-spacing:4px; color:var(--text-dim); margin-top:-4px;
}
.pres-inc { font-size:12px; color:var(--text-muted); margin-top:14px; font-weight:500; }

/* SOLD block */
.pres-sold-block {
  margin-top:26px; padding-top:26px; border-top:1px solid var(--navy-border);
  position:relative; z-index:2;
}
.pres-sold-eyebrow {
  font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700;
  letter-spacing:3px; color:var(--green); text-transform:uppercase;
  display:flex; align-items:center; gap:8px;
}
.pres-sold-eyebrow::before { content:''; width:12px; height:2px; background:var(--green); }
.pres-sold-team {
  font-family:'Barlow Condensed',sans-serif; font-size:44px; font-weight:900;
  letter-spacing:1px; color:var(--green); line-height:1.05;
  text-transform:uppercase; margin-top:4px;
}
.pres-sold-sub { font-size:13px; color:var(--text-muted); margin-top:4px; font-weight:500; }

/* Budget strip */
.pres-budget-strip {
  border-top:1px solid var(--navy-border);
  background:rgba(10,14,26,0.95); backdrop-filter:blur(10px);
  padding:8px 32px; flex-shrink:0; position:relative; z-index:10;
}
.pres-budget-row { display:flex; gap:8px; overflow-x:auto; }
.ptm {
  background:var(--navy-card); border:1px solid var(--navy-border);
  border-radius:7px; padding:8px 12px; min-width:135px;
}
.ptm-name {
  font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:800;
  letter-spacing:0.5px; color:var(--white); text-transform:uppercase; margin-bottom:2px;
}
.ptm-bal { font-family:'DM Mono',monospace; font-size:11px; }
.ptm-slots { font-size:9px; color:var(--text-muted); margin-top:1px; }
.ptm-bar { height:2px; background:rgba(255,255,255,0.05); border-radius:1px; margin-top:6px; overflow:hidden; }
.ptm-fill { height:100%; border-radius:1px; }

/* ─── SPONSOR BAR ─────────────────────────────────────────────────────────── */
.sponsor-bar {
  border-top:2px solid var(--blue);
  background:var(--navy-mid);
  padding:10px 32px 12px;
  flex-shrink:0; position:relative; z-index:10;
}
/* Title row */
.spon-title-row {
  display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:8px;
}
.spon-title-eyebrow {
  font-family:'Barlow Condensed',sans-serif; font-size:8px; font-weight:700;
  letter-spacing:2.5px; text-transform:uppercase; color:var(--tier-title); white-space:nowrap;
}
.spon-title-slot {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,184,0,0.06); border:1px solid rgba(255,184,0,0.2);
  border-radius:6px; padding:5px 16px; min-width:160px; justify-content:center;
}
.spon-title-img { height:28px; max-width:120px; object-fit:contain; }
.spon-title-name {
  font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:800;
  letter-spacing:1px; color:var(--tier-title);
}
.spon-title-ph { font-size:10px; color:rgba(255,184,0,0.35); letter-spacing:1px; }
/* Multi-tier rows */
.spon-multi-row {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center;
}
.spon-row-lbl {
  font-family:'Barlow Condensed',sans-serif; font-size:7px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase; white-space:nowrap; width:54px; text-align:right; flex-shrink:0;
}
.spon-divider { width:1px; height:18px; background:var(--navy-border); flex-shrink:0; }
.spon-slot-wrap {
  display:flex; align-items:center; justify-content:center;
  border-radius:5px; padding:3px 10px; gap:5px;
}
.spon-slot-platinum { background:rgba(200,216,232,0.05); border:1px solid rgba(200,216,232,0.15); min-width:110px; }
.spon-slot-gold     { background:rgba(255,184,0,0.04);   border:1px solid rgba(255,184,0,0.12);   min-width:90px; }
.spon-slot-silver   { background:rgba(136,153,187,0.04); border:1px solid rgba(136,153,187,0.1);  min-width:74px; }
.spon-slot-catering { background:rgba(0,194,203,0.04);   border:1px solid rgba(0,194,203,0.1);    min-width:70px; }
.spon-img-md  { height:20px; max-width:90px;  object-fit:contain; }
.spon-img-sm  { height:15px; max-width:70px;  object-fit:contain; }
.spon-name-display { font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:0.5px; }
.spon-n-plat { font-size:12px; color:var(--tier-platinum); }
.spon-n-gold { font-size:11px; color:var(--tier-gold); }
.spon-n-silv { font-size:10px; color:var(--tier-silver); }
.spon-n-cate { font-size:10px; color:var(--tier-catering); }
.spon-ph-plat { font-size:9px; color:rgba(200,216,232,0.25); }
.spon-ph-gold { font-size:9px; color:rgba(255,184,0,0.25); }
.spon-ph-silv { font-size:9px; color:rgba(136,153,187,0.2); }
.spon-ph-cate { font-size:9px; color:rgba(0,194,203,0.2); }

/* ─── ANIMATIONS ─────────────────────────────────────────────────────────── */
@keyframes imgReveal  { 0%{opacity:0;transform:scale(1.07) translateY(14px);filter:blur(5px)} 100%{opacity:1;transform:scale(1) translateY(0);filter:blur(0)} }
@keyframes slideUp    { 0%{opacity:0;transform:translateY(24px)} 100%{opacity:1;transform:translateY(0)} }
@keyframes fadeInLeft { 0%{opacity:0;transform:translateX(-12px)} 100%{opacity:1;transform:translateX(0)} }
@keyframes bidPop     { 0%{transform:scale(0.78);opacity:0} 65%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
@keyframes soldFlash  { 0%{opacity:0} 12%{opacity:1} 75%{opacity:1} 100%{opacity:0} }
@keyframes soldSweep  { 0%{opacity:0;transform:translateX(-28px);letter-spacing:8px} 100%{opacity:1;transform:translateX(0);letter-spacing:1px} }
@keyframes soldSub    { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }
@keyframes catBurst   { 0%{opacity:0;transform:scale(0.5) translateY(-16px)} 65%{transform:scale(1.04) translateY(2px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
@keyframes numShimmer { 0%,100%{color:var(--white)} 50%{color:#fff;text-shadow:0 0 32px rgba(0,87,255,0.8)} }
@keyframes soldGlow   { 0%{color:var(--white);text-shadow:none} 30%{color:var(--green);text-shadow:0 0 40px rgba(0,214,143,0.6)} 100%{color:var(--white);text-shadow:none} }
@keyframes particleFly { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0} }
@keyframes stripeSlide { 0%{opacity:0;transform:scaleX(0)} 100%{opacity:1;transform:scaleX(1)} }

.anim-img-reveal  { animation:imgReveal 0.55s cubic-bezier(0.22,1,0.36,1) forwards; }
.anim-name        { animation:slideUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards; opacity:0; }
.anim-num         { animation:slideUp 0.4s cubic-bezier(0.22,1,0.36,1) 0.08s forwards; opacity:0; }
.anim-detail-1    { animation:fadeInLeft 0.4s ease 0.2s forwards; opacity:0; }
.anim-detail-2    { animation:fadeInLeft 0.4s ease 0.28s forwards; opacity:0; }
.anim-bid-pop     { animation:bidPop 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards; }
.anim-sold-sweep  { animation:soldSweep 0.55s cubic-bezier(0.22,1,0.36,1) forwards; }
.anim-sold-sub    { animation:soldSub 0.4s ease 0.2s forwards; opacity:0; }
.anim-cat-burst   { animation:catBurst 0.5s cubic-bezier(0.22,1,0.36,1) forwards; }
.bid-shimmer      { animation:numShimmer 0.6s ease forwards; }
.bid-sold-glow    { animation:soldGlow 1.8s ease forwards; }

/* Flash overlay */
#sold-flash-overlay {
  position:fixed; inset:0; z-index:500; pointer-events:none; display:none;
  background:radial-gradient(ellipse at center, rgba(0,214,143,0.15) 0%, transparent 65%);
}
#sold-flash-overlay.active { display:block; animation:soldFlash 1.5s ease forwards; }
#sold-particles { position:fixed; inset:0; z-index:501; pointer-events:none; overflow:hidden; }
.particle {
  position:absolute; border-radius:50%;
  animation:particleFly var(--dur) ease forwards;
}

.teams-wrap { padding:24px; max-width:1400px; margin:0 auto; }
.teams-page-head { margin-bottom:22px; }

.setup-section-

/* ═══════════════════════════════════════════════════════════
   BENTO PRESENTATION LAYOUT
   ═══════════════════════════════════════════════════════════ */

/* Override the old pres-page flex layout with a proper grid */
.pres-page {
  height: 100% !important;
  display: grid !important;
  grid-template-rows: 58px 1fr 62px 66px !important;
  overflow: hidden !important;
  background: var(--navy) !important;
  flex-direction: unset !important;
}

/* Top bar */
.pres-top {
  display: grid;
  grid-template-columns: 200px 1fr 220px;
  align-items: center;
  padding: 0 24px;
  border-bottom: 2px solid var(--blue);
  background: var(--navy-card);
  box-shadow: 0 4px 24px rgba(0,87,255,0.15);
  z-index: 10;
}

/* Three-column bento spotlight */
.pres-spotlight {
  display: grid !important;
  grid-template-columns: 2fr 3fr 2fr !important;
  gap: 8px !important;
  padding: 8px !important;
  overflow: hidden !important;
  min-height: 0 !important;
  flex: unset !important;
}

/* LEFT bento — player card */
.pres-player-side {
  border-right: none !important;
  background: var(--navy-card);
  border: 1px solid var(--navy-border);
  border-radius: 14px;
  padding: 12px 14px;
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  justify-content: center !important;
  text-align: center !important;
  position: relative;
  overflow: hidden;
  gap: 0 !important;
}
.pres-player-side::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0,87,255,0.08) 0%, transparent 60%);
  pointer-events: none;
}
.pres-player-side::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--blue), var(--teal));
}

.pres-player-img-wrap { margin-bottom: 8px; position: relative; z-index: 2; }
.pres-player-img {
  width: 110px; height: 145px; object-fit: cover;
  border-radius: 10px;
  border: 2px solid rgba(0,87,255,0.5);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.pres-player-img-ph {
  width: 110px; height: 145px; border-radius: 10px;
  border: 2px dashed rgba(0,87,255,0.3);
  background: var(--navy-panel);
  display: flex; align-items: center; justify-content: center; font-size: 44px;
}

.pres-player-text { position: relative; z-index: 2; width: 100%; }
.pres-p-group {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 3px;
  color: var(--blue); text-transform: uppercase; margin-bottom: 5px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.pres-p-group::before, .pres-p-group::after {
  content: ''; flex: 1; max-width: 30px; height: 1px; background: rgba(0,87,255,0.3);
}
.pres-p-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 600; letter-spacing: 2px;
  color: var(--text-muted); margin-bottom: 4px;
}
.pres-p-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 38px; font-weight: 900; letter-spacing: 1px;
  line-height: 0.92; color: var(--white); text-transform: uppercase;
  margin-bottom: 8px;
}
.pres-d-row {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; margin-bottom: 5px;
}
.pres-d-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  color: var(--text-muted); text-transform: uppercase;
  background: var(--navy-panel); border-radius: 3px; padding: 2px 7px;
}
.pres-d-val { font-size: 16px; color: var(--text); font-weight: 500; }

/* CENTRE bento — bid */
.pres-bid-side {
  background: var(--navy-card) !important;
  border: 1px solid var(--navy-border) !important;
  border-radius: 14px !important;
  padding: 16px 20px !important;
  display: flex !important;
  flex-direction: column !important;
  justify-content: center !important;
  align-items: center !important;
  text-align: center !important;
  position: relative !important;
  overflow: hidden !important;
}
.pres-bid-side::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--blue), transparent);
}
.pres-bid-side::after {
  content: '';
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 280px; height: 280px;
  background: radial-gradient(ellipse, rgba(0,87,255,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.pres-bid-eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px; font-weight: 700; letter-spacing: 3px;
  color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px;
  position: relative; z-index: 2;
}
.pres-bid-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 110px; font-weight: 900; letter-spacing: -2px; line-height: 1;
  color: var(--white); position: relative; z-index: 2;
}
.pres-bid-unit {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 700; letter-spacing: 4px;
  color: var(--text-muted); margin-top: -4px; position: relative; z-index: 2;
}
.pres-inc { font-size: 18px; font-weight: 500; color: var(--text-muted); margin-top: 12px; position: relative; z-index: 2; }
.pres-sold-block {
  margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--navy-border);
  position: relative; z-index: 2;
  text-align: center; width: 100%;
}
.pres-sold-eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 700; letter-spacing: 3px;
  color: var(--green); text-transform: uppercase;
  display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 6px;
}
.pres-sold-eyebrow::before { content: ''; width: 20px; height: 2px; background: var(--green); }
.pres-sold-eyebrow::after  { content: ''; width: 20px; height: 2px; background: var(--green); }
.pres-sold-team {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 46px; font-weight: 900; letter-spacing: 1px;
  color: var(--green); line-height: 1.05; text-transform: uppercase;
}
.pres-sold-sub { font-size: 16px; color: var(--text-muted); margin-top: 5px; font-weight: 500; }
.pres-sold-logo {
  width: 54px; height: 54px; border-radius: 8px; object-fit: contain;
  background: rgba(0,214,143,0.08); border: 1px solid rgba(0,214,143,0.2); padding: 4px;
  margin: 0 auto 8px auto; display: block;
}

/* RIGHT bento — stats + mini teams */
.pres-stats-panel {
  display: flex !important;
  flex-direction: column !important;
  gap: 7px !important;
  overflow: hidden !important;
  padding: 2px !important;
}
.pres-stat-box {
  background: var(--navy-card);
  border: 1px solid var(--navy-border);
  border-radius: 10px; padding: 10px 14px;
  flex: 0 0 auto; position: relative; overflow: hidden;
}
.pres-stat-box-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px;
}
.pres-stat-box-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 44px; font-weight: 900; letter-spacing: -1px; line-height: 1; color: var(--white);
}
.pres-stat-box-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
.pres-mini-teams {
  background: var(--navy-card); border: 1px solid var(--navy-border);
  border-radius: 12px; padding: 8px 10px;
  flex: 1; overflow: hidden; min-height: 0;
  display: flex; flex-direction: column;
}
.pres-mini-teams-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 9px; flex-shrink: 0;
}
#pres-mini-teams-list { flex: 1; overflow-y: auto; min-height: 0; }
.pres-mini-team-row {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  min-height: 0;
}
.pres-mini-team-row:last-child { border-bottom: none; }
.pres-mini-logo {
  width: 16px; height: 16px; border-radius: 3px; object-fit: contain;
  background: rgba(255,255,255,0.04); flex-shrink: 0;
}
.pres-mini-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 700; letter-spacing: 0.5px;
  text-transform: uppercase; color: var(--text); flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.pres-mini-bal { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text-muted); }
.pres-mini-bar { height: 2px; background: rgba(255,255,255,0.05); border-radius: 1px; overflow: hidden; }
.pres-mini-fill { height: 100%; border-radius: 1px; }

/* Budget strip */
.pres-budget-strip {
  border-top: 1px solid var(--navy-border);
  padding: 4px 12px;
  background: var(--navy-card);
  display: flex; align-items: center;
  z-index: 10;
  overflow: hidden;
}
.pres-budget-row {
  display: flex; gap: 8px; overflow-x: auto; width: 100%; align-items: center;
}
.ptm {
  background: var(--navy-panel); border: 1px solid var(--navy-border);
  border-radius: 6px; padding: 4px 8px;
  min-width: 110px; display: flex; gap: 5px; align-items: center; flex-shrink: 0;
}
.ptm-logo { width: 18px; height: 18px; border-radius: 3px; object-fit: contain; flex-shrink: 0; }
.ptm-logo-slot { width: 18px; height: 18px; flex-shrink: 0; }
.ptm-name {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 800;
  letter-spacing: 0.5px; color: var(--white); text-transform: uppercase;
}
.ptm-bal { font-family: 'DM Mono', monospace; font-size: 9px; }
.ptm-bar { height: 2px; background: rgba(255,255,255,0.05); border-radius: 1px; overflow: hidden; margin-top: 2px; }
.ptm-fill { height: 100%; border-radius: 1px; }

/* Sponsor bar */
.sponsor-bar {
  border-top: 2px solid var(--blue);
  background: var(--navy-mid);
  padding: 5px 24px 7px;
  z-index: 10;
  overflow: hidden;
}

/* Page-level height fix */
#page-presentation { height: calc(100vh - 58px); overflow: hidden; }

/* Category flash */
#cat-flash {
  position: fixed; inset: 0; z-index: 400; pointer-events: none;
  display: none; align-items: center; justify-content: center;
}
#cat-flash.active { display: flex; }
#cat-flash-inner {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 120px; font-weight: 900; letter-spacing: 4px;
  text-transform: uppercase; opacity: 0;
  animation: catFlashAnim 2s ease forwards;
}
@keyframes catFlashAnim {
  0%   { opacity:0; transform:scale(0.6); filter:blur(20px); }
  20%  { opacity:1; transform:scale(1.05); filter:blur(0); }
  70%  { opacity:1; transform:scale(1); }
  100% { opacity:0; transform:scale(1.1); filter:blur(10px); }
}

function save(){
  try{
    const slim={...S,playerImages:{},sponsorImages:{},teamImages:{}};
    localStorage.setItem('hpl2026',JSON.stringify(slim));
    localStorage.setItem('hpl2026-pimgs',JSON.stringify(S.playerImages));
    localStorage.setItem('hpl2026-timgs',JSON.stringify(S.teamImages));
    localStorage.setItem('hpl2026-simgs',JSON.stringify(S.sponsorImages));
  }catch(e){}
}
function load(){
  try{
    const d=localStorage.getItem('hpl2026');
    if(d){S={...JSON.parse(d),playerImages:{},sponsorImages:{}};}
    const pi=localStorage.getItem('hpl2026-pimgs'); if(pi)S.playerImages=JSON.parse(pi);
    const si=localStorage.getItem('hpl2026-simgs'); if(si)S.sponsorImages=JSON.parse(si);
    const ti=localStorage.getItem('hpl2026-timgs'); if(ti)S.teamImages=JSON.parse(ti);
  }catch(e){}
}

// ===== NAV =====
function showPage(p,tab){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(tab)tab.classList.add('active');
  if(p==='admin')renderAdmin();
  if(p==='presentation'){
    _lastRenderedPlayer = null;
    _lastRenderedCat = null;
    renderPres();
  }
  if(p==='teams')renderTeamsPage();
  if(p==='setup'){renderImgManager();renderSponsorSlots();}
}

function updateCounts(){

function initAuction(){
  const capLines=document.getElementById('captains-input').value.trim().split('\n').filter(l=>l.trim());
  const playerLines=document.getElementById('players-input').value.trim().split('\n').filter(l=>l.trim());
  if(capLines.length<2||playerLines.length<1){showMsg('setup-msg','Enter at least 2 captains and 1 player','warn');return;}
  S.settings={
    budget:parseInt(document.getElementById('s-budget').value)||36000,
    catA:{start:parseInt(document.getElementById('s-a-start').value)||4000,inc:parseInt(document.getElementById('s-a-inc').value)||1000},
    catB:{start:parseInt(document.getElementById('s-b-start').value)||2000,inc:parseInt(document.getElementById('s-b-inc').value)||500},
    catC:{start:parseInt(document.getElementById('s-c-start').value)||1000,inc:parseInt(document.getElementById('s-c-inc').value)||300},
    fine:parseInt(document.getElementById('s-fine').value)||450,
    teamSize:parseInt(document.getElementById('s-team-size').value)||10,
    aMax:parseInt(document.getElementById('s-a-max').value)||2
  };
  const existPi=S.playerImages||{};
  const existSi=S.sponsorImages||{};
  const existSn=S.sponsorNames||{};
  const existTi=S.teamImages||{};
  S.captains=capLines.map((line,i)=>{const p=line.split(',').map(s=>s.trim());return{id:'cap'+i,name:p[0]||'Captain '+(i+1),teamName:p[1]||'Team '+(i+1),budget:S.settings.budget,spent:0,fines:0,players:[],catAPicks:0};});
  S.players=playerLines.map((line,i)=>{const p=line.split(',').map(s=>s.trim());const cat=(p[1]||'C').toUpperCase();return{id:'pl'+i,name:p[0]||'Player '+(i+1),category:cat,role:p[2]||'—',info:p[3]||'—',displayOrder:i+1,sold:false,soldTo:null,soldPrice:0};});
  ['A','B','C'].forEach(cat=>{const arr=S.players.filter(p=>p.category===cat);for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i].displayOrder,arr[j].displayOrder]=[arr[j].displayOrder,arr[i].displayOrder];}arr.forEach((p,i)=>p.displayOrder=i+1);});
  S.playerImages=existPi;S.sponsorImages=existSi;S.sponsorNames=existSn;S.teamImages=existTi;
  S.history=[];S.unsoldIds=[];S.currentCat='A';S.currentPlayer=null;S.initialized=true;
  save();renderImgManager();renderTeamLogoManager();
  showMsg('setup-msg',`✓ HPL 2026 initialized! ${S.captains.length} captains · ${S.players.length} players`,'ok');
}

function renderAdmin(){
  if(!document.getElementById('queue-list')) return; // not on this page
  if(!S.initialized){document.getElementById('queue-list').innerHTML='<div style="padding:10px;font-size:12px;color:var(--text-muted);">Initialize auction in Setup first.</div>';return;}
  renderQueue();renderCapSelects();renderCapBudgets();renderTeamsGrid('a-teams-grid');updateCatDisplay();updateProgress();renderUnsoldSel();
  document.getElementById('fine-lbl').textContent=S.settings.fine;
}

function getCatCfg(cat){return cat==='A'?S.settings.catA:cat==='B'?S.settings.catB:S.settings.catC;}

function setCat(cat){
  S.currentCat=cat;S.currentPlayer=null;save();
  updateCatDisplay();renderQueue();
  document.getElementById('q-cat-lbl').textContent=cat==='A'?'Group 1':cat==='B'?'Group 2':'Group 3';
  resetCpCard();smartRenderPres();
}

function updateCatDisplay(){
  const cfg=getCatCfg(S.currentCat);
  document.getElementById('a-cat-start').textContent=cfg.start.toLocaleString();
  document.getElementById('a-cat-inc').textContent=cfg.inc.toLocaleString();
  const cls={A:'badge-a',B:'badge-b',C:'badge-c'};
  const grpName={A:'GROUP 1',B:'GROUP 2',C:'GROUP 3'};
  document.getElementById('a-cat-badge').innerHTML=`<span class="cat-badge ${cls[S.currentCat]}">● ${grpName[S.currentCat]}</span>`;
}

function renderQueue() {
  var el = document.getElementById('queue-list');
  var players = S.players.filter(function(p){ return p.category === S.currentCat; })
    .sort(function(a,b){ return a.displayOrder - b.displayOrder; });
  if (!players.length) {
    el.innerHTML = '<div style="padding:10px;font-size:12px;color:var(--text-muted);">No players in this category.</div>';
    return;
  }
  var html = '';
  players.forEach(function(p) {
    var soldCap = p.sold ? S.captains.find(function(c){ return c.id === p.soldTo; }) : null;
    var cls = 'queue-item' + (p.sold ? ' sold' : '') + (S.currentPlayer === p.id ? ' selected' : '');
    var click = p.sold ? '' : 'onclick="selectPlayer(\'' + p.id + '\')"';
    var badge = p.sold
      ? '<span style="font-size:9px;color:var(--green);">&#10003; ' + (soldCap ? soldCap.teamName : '&#8212;') + '</span>'
      : '<span class="tag tag-' + p.category.toLowerCase() + '">' + p.category + '</span>';
    var strikethrough = p.sold ? 'text-decoration:line-through;' : '';
    html += '<div class="' + cls + '" ' + click + '>'
          + '<div class="q-thumb" style="display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;">&#127959;</div>'
          + '<span class="q-num">#' + p.displayOrder + '</span>'
          + '<span class="q-name" style="' + strikethrough + '">' + p.name + '</span>'
          + badge
          + '</div>';
  });
  el.innerHTML = html;
}

function selectPlayer(pid){
  S.currentPlayer=pid;save();
  const p=S.players.find(pl=>pl.id===pid);if(!p)return;
  const cfg=getCatCfg(p.category);
  const wrap=document.getElementById('cp-img-wrap');
  if(wrap){wrap.className='cp-img-ph';wrap.textContent='🏏';}
  document.getElementById('cp-name').textContent=p.name;
  document.getElementById('cp-detail').textContent=p.role+(p.info&&p.info!=='—'?' · '+p.info:'');
  document.getElementById('cp-tag').innerHTML=`<span class="tag tag-${p.category.toLowerCase()}">Group ${p.category==='A'?1:p.category==='B'?2:3}</span>`;
  document.getElementById('bid-amt').value=cfg.start;
  renderQueue();
  // Only render presentation if its tab is currently active
  // (avoids stale _lastRenderedPlayer preventing animations on tab switch)
  const presPage = document.getElementById('page-presentation');
  if (presPage && presPage.classList.contains('active')) {
    _lastRenderedPlayer = null; // force full re-render with animations
    renderPres();
  }
}

function resetCpCard(){
  const wrap=document.getElementById('cp-img-wrap');
  wrap.className='cp-img-ph';wrap.textContent='🏏';if(wrap.tagName==='IMG'){wrap.removeAttribute('src');}
  document.getElementById('cp-name').textContent='— Select Player —';
  document.getElementById('cp-detail').textContent='Click from queue below';
  document.getElementById('cp-tag').innerHTML='';
  document.getElementById('bid-amt').value='';
}

function confirmSale(){
  if(!S.currentPlayer){alert('Select a player first');return;}
  const capId=document.getElementById('win-captain').value;
  if(!capId){alert('Select winning captain');return;}
  const bid=parseInt(document.getElementById('bid-amt').value);
  if(!bid||bid<1){alert('Enter bid amount');return;}
  const player=S.players.find(p=>p.id===S.currentPlayer),captain=S.captains.find(c=>c.id===capId),cfg=getCatCfg(player.category);
  if(bid<cfg.start){alert(`Minimum bid: ${cfg.start.toLocaleString()} pts`);return;}
  if(bid>captain.budget-captain.spent){alert(`${captain.name} only has ${(captain.budget-captain.spent).toLocaleString()} pts`);return;}
  if(captain.players.length>=S.settings.teamSize-1){alert(`${captain.name}'s team is full`);return;}
  if(player.category==='A'&&captain.catAPicks>=S.settings.aMax){alert(`${captain.name} has reached max Group 1 picks`);return;}

  S.history.push({playerId:player.id,captainId:capId,price:bid,catA:player.category==='A'});
  player.sold=true;player.soldTo=capId;player.soldPrice=bid;
  captain.spent+=bid;captain.players.push(player.id);
  if(player.category==='A')captain.catAPicks++;
  S.unsoldIds=S.unsoldIds.filter(id=>id!==player.id);
  // Trigger sold animation: keep currentPlayer set while renderPres fires once, THEN clear
  S.currentPlayer=null; save(); resetCpCard();
  document.getElementById('win-captain').value=''; document.getElementById('bid-amt').value='';
  // Re-point currentPlayer briefly to sold player so presentation shows the sold state
  S.currentPlayer = player.id;
  _lastRenderedPlayer = player.id; // not 'changed' — triggers sold effect branch
  smartRenderPres();
  S.currentPlayer = null;
  _lastRenderedPlayer = null;
  renderAdmin();
  autoAdvance();
}

function markUnsold(){
  if(!S.currentPlayer){alert('Select a player first');return;}
  if(!S.unsoldIds.includes(S.currentPlayer))S.unsoldIds.push(S.currentPlayer);
  S.currentPlayer=null;save();resetCpCard();renderQueue();updateProgress();renderUnsoldSel();
}


function applyFineOnly() {
  const capId = document.getElementById('unsold-cap-sel').value;
  if (!capId) { alert('Select a captain to fine'); return; }
  const captain = S.captains.find(c => c.id === capId);
  if (!confirm(`Apply $${S.settings.fine} fine to ${captain.name} (${captain.teamName})? No player will be assigned.`)) return;
  captain.fines += S.settings.fine;
  save();
  renderAdmin();
}

function assignUnsold(withFine=true){
  const pid=document.getElementById('unsold-player-sel').value,capId=document.getElementById('unsold-cap-sel').value;
  if(!pid||!capId){alert('Select player and captain');return;}
  const player=S.players.find(p=>p.id===pid),captain=S.captains.find(c=>c.id===capId),cfg=getCatCfg(player.category);
  if(captain.players.length>=S.settings.teamSize-1){alert('Team is full');return;}
  const fineMsg = withFine ? ` + $${S.settings.fine} fine` : ' (no fine)';
  if(!confirm(`Assign ${player.name} to ${captain.teamName}${fineMsg}?`)) return;
  player.sold=true;player.soldTo=capId;player.soldPrice=cfg.start;
  captain.spent+=cfg.start;
  if(withFine) captain.fines+=S.settings.fine;
  captain.players.push(player.id);
  if(player.category==='A')captain.catAPicks++;
  S.unsoldIds=S.unsoldIds.filter(id=>id!==pid);
  save();renderAdmin();smartRenderPres();
}

function undoSale(){
  if(!S.history.length){alert('Nothing to undo');return;}
  const last=S.history.pop(),player=S.players.find(p=>p.id===last.playerId),captain=S.captains.find(c=>c.id===last.captainId);
  captain.spent-=last.price;captain.players=captain.players.filter(id=>id!==player.id);
  if(last.catA)captain.catAPicks--;
  player.sold=false;player.soldTo=null;player.soldPrice=0;
  save();renderAdmin();smartRenderPres();
}

function updateProgress(){
  const sold=S.players.filter(p=>p.sold);
  document.getElementById('prog-a').textContent=sold.filter(p=>p.category==='A').length;
  document.getElementById('prog-b').textContent=sold.filter(p=>p.category==='B').length;
  document.getElementById('prog-c').textContent=sold.filter(p=>p.category==='C').length;
  const catUnsold=S.players.filter(p=>p.category===S.currentCat&&!p.sold).length;
  const ua=document.getElementById('unsold-alert');ua.style.display=catUnsold?'block':'none';
  document.getElementById('unsold-ct').textContent=catUnsold;
}

// Smart renderPres — only animates if presentation tab is active,
// otherwise just updates state so it renders correctly when tab opens
function smartRenderPres() {
  const presPage = document.getElementById('page-presentation');
  if (presPage && presPage.classList.contains('active')) {
    smartRenderPres();
  }
  // If pres tab is not active, state is already saved — renderPres()
  // will be called with fresh tracking vars when tab is opened
}

// _lastRenderedPlayer and _lastRenderedCat declared in renderPres section

function triggerClass(el, cls, ms=1200) {
  if(!el) return;
  el.classList.remove(cls);
  void el.offsetWidth; // reflow
  el.classList.add(cls);
  setTimeout(()=>el.classList.remove(cls), ms);
}

function triggerSoldEffect() {
  // Flash overlay
  const overlay = document.getElementById('sold-flash-overlay');
  overlay.classList.remove('active');
  void overlay.offsetWidth;
  overlay.classList.add('active');
  setTimeout(()=>overlay.classList.remove('active'), 1500);

  // Particles
  const container = document.getElementById('sold-particles');
  container.innerHTML = '';
  const colors = ['#4ECDC4','#B8C8CC','#D4A84B','#ffffff','#8BAF9C'];
  const cx = window.innerWidth / 2, cy = window.innerHeight * 0.42;
  for(let i=0; i<36; i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI*2/36)*i + (Math.random()-0.5)*0.4;
    const dist  = 120 + Math.random()*200;
    const tx    = Math.cos(angle)*dist, ty = Math.sin(angle)*dist - 60;
    const dur   = (0.8 + Math.random()*0.8).toFixed(2)+'s';
    const color = colors[Math.floor(Math.random()*colors.length)];
    const size  = (4+Math.random()*6).toFixed(0)+'px';
    p.style.cssText = `left:${cx}px;top:${cy}px;width:${size};height:${size};background:${color};--tx:${tx}px;--ty:${ty}px;--dur:${dur};`;
    container.appendChild(p);
  }
  setTimeout(()=>{container.innerHTML='';}, 2000);
}

function animateNumber(el, start, end, duration=600) {
  if(!el) return;
  const startTime = performance.now();
  const range = end - start;
  function step(now){
    const elapsed = Math.min(now - startTime, duration);
    const t = 1 - Math.pow(1 - elapsed/duration, 3); // ease-out cubic
    el.textContent = Math.round(start + range*t).toLocaleString();
    if(elapsed < duration) requestAnimationFrame(step);
    else el.textContent = end.toLocaleString();
  }
  requestAnimationFrame(step);
}

function shuffleQueue() {
  // Only shuffle unsold players in current category
  const unsold = S.players.filter(p => p.category === S.currentCat && !p.sold);
  if (unsold.length < 2) return;

  // Fisher-Yates on display orders of unsold players
  const orders = unsold.map(p => p.displayOrder);
  for (let i = orders.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [orders[i], orders[j]] = [orders[j], orders[i]];
  }
  unsold.forEach((p, i) => p.displayOrder = orders[i]);

  // Clear current selection — reshuffling mid-selection could confuse state
  S.currentPlayer = null;
  _lastRenderedPlayer = null;
  save();
  resetCpCard();
  renderQueue();
  smartRenderPres();

  // Flash the shuffle button briefly
  const btn = document.querySelector('[onclick="shuffleQueue()"]');
  if (btn) {
    btn.style.color = 'var(--green)';
    btn.style.borderColor = 'rgba(0,214,143,0.4)';
    setTimeout(() => {
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 800);
  }
}

function autoAdvance() {
  // Find the next unsold player in current category by display order
  const next = S.players
    .filter(p => p.category === S.currentCat && !p.sold)
    .sort((a, b) => a.displayOrder - b.displayOrder)[0];

  if (next) {
    // Brief delay so the SOLD state is visible on presentation first
    setTimeout(() => {
      selectPlayer(next.id);
    }, 1800);
  }
}

// ===== CSV UPLOAD =====

function parseCSV(text) {
  // Handle both comma and tab separators, strip BOM, normalise line endings
  text = text.replace(/^\uFEFF/, '').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  return lines.map(line => {
    // Handle quoted fields
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if ((ch === ',' || ch === '\t') && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

function setupCSVHandler(fileInputId, textareaId, statusId, mode) {
  document.getElementById(fileInputId).addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const rows = parseCSV(ev.target.result);
      const statusEl = document.getElementById(statusId);

      // Detect and skip header row
      let startRow = 0;
      if (rows.length > 0) {
        const firstCell = rows[0][0].toLowerCase();
        if (['name','player','captain','#'].some(h => firstCell.includes(h))) {
          startRow = 1;
        }
      }

      const dataRows = rows.slice(startRow);
      let good = 0, warned = 0, lines = [], previewHTML = '';

      if (mode === 'captains') {
        dataRows.forEach((cols, i) => {
          if (!cols[0]) return;
          const name = cols[0], team = cols[1] || '';
          const line = team ? `${name}, ${team}` : name;
          lines.push(line);
          const rowClass = team ? 'csv-row-ok' : 'csv-row-warn';
          if (!team) warned++;
          else good++;
          previewHTML += `<div class="${rowClass}">${i+1+startRow}. ${line}${!team?' <span style="opacity:0.5;">(no team name)</span>':''}</div>`;
        });
        document.getElementById(textareaId).value = lines.join('\n');
        statusEl.textContent = `✓ ${good} captains loaded${warned ? ', '+warned+' missing team name' : ''}`;
        statusEl.style.color = warned ? 'var(--amber)' : 'var(--green)';
      }

      if (mode === 'players') {
        const validCats = ['A','B','C'];
        dataRows.forEach((cols, i) => {
          if (!cols[0]) return;
          const name = cols[0];
          const cat  = (cols[1]||'').trim().toUpperCase();
          const role = cols[2] || '';
          const info = cols[3] || '';
          const catOk = validCats.includes(cat);
          const line = `${name}, ${cat||'?'}, ${role}, ${info}`;
          lines.push(`${name}, ${catOk?cat:'C'}, ${role}, ${info}`);
          if (!catOk) {
            previewHTML += `<div class="csv-row-warn">${i+1+startRow}. ${line} <span style="opacity:0.6;">(category '${cols[1]||''}' → defaulted to C)</span></div>`;
            warned++;
          } else {
            previewHTML += `<div class="csv-row-ok">${i+1+startRow}. ${line}</div>`;
            good++;
          }
        });
        document.getElementById(textareaId).value = lines.join('\n');
        statusEl.textContent = `✓ ${good} players loaded${warned ? ', '+warned+' category warnings' : ''}`;
        statusEl.style.color = warned ? 'var(--amber)' : 'var(--green)';
        updateCounts();
      }

      // Show preview below the textarea
      const previewId = textareaId + '-csv-preview';
      let previewEl = document.getElementById(previewId);
      if (!previewEl) {
        previewEl = document.createElement('div');
        previewEl.id = previewId;
        previewEl.className = 'csv-preview';
        document.getElementById(textareaId).parentNode.appendChild(previewEl);
      }
      previewEl.style.display = 'block';
      previewEl.innerHTML = `
        <div class="csv-preview-header">
          <span>Preview — ${lines.length} rows from <strong style="color:var(--steel);">${file.name}</strong></span>
          <span style="cursor:pointer;color:var(--text-dim);" onclick="this.closest('.csv-preview').style.display='none'">✕ close</span>
        </div>
        <div class="csv-preview-body">${previewHTML}</div>`;
    };
    reader.readAsText(file);
    this.value = ''; // reset so same file can be re-uploaded
  });
}

function animateNumber(el, start, end, duration=600) {
  if(!el) return;

  function step(now){ const e=Math.min(now-t0,duration),t=1-Math.pow(1-e/duration,3);

      const ang=(Math.PI*2/42)*i+(Math.random()-.5)*.5,dist=100+Math.random()*260;
      const tx=Math.cos(ang)*dist,ty=Math.sin(ang)*dist-80;
      const dur=(0.7+Math.random()*.9).toFixed(2)+'s';
      const col=cols[Math.floor(Math.random()*cols.length)];
      const sz=(4+Math.random()*8).toFixed(0)+'px';
      pa.style.cssText=`left:${cx}px;top:${cy}px;width:${sz};height:${sz};background:${col};--tx:${tx}px;--ty:${ty}px;--dur:${dur};border-radius:${Math.random()>.5?'50%':'2px'};`;
      pc.appendChild(pa);}
    setTimeout(()=>{pc.innerHTML='';},2200);}
}

function renderPres() {
  if(!S.initialized) return;
  const cfg=getCatCfg(S.currentCat);
  const catColors={A:'var(--cat-a)',B:'var(--cat-b)',C:'var(--cat-c)'};
  const catNames={A:'GROUP 1',B:'GROUP 2',C:'GROUP 3'};

  // Category
  if(S.currentCat!==_lastRenderedCat){
    const el=document.getElementById('pres-cat-val');
    if(el){el.textContent=catNames[S.currentCat];el.style.color=catColors[S.currentCat];triggerClass(el,'anim-cat-burst',600);}
    _lastRenderedCat=S.currentCat;
    // Big flash
    const cf=document.getElementById('cat-flash');
    const ci=document.getElementById('cat-flash-inner');
    if(cf&&ci){ci.textContent=catNames[S.currentCat];ci.style.color=catColors[S.currentCat];
      cf.classList.remove('active');void cf.offsetWidth;cf.classList.add('active');
      setTimeout(()=>cf.classList.remove('active'),2200);}
  }

  const sold=S.players.filter(p=>p.sold).length;
  const remaining=S.players.length-sold;
  const el_rem=document.getElementById('pres-remaining');
  const el_sold=document.getElementById('pres-sold-total');
  if(el_rem) el_rem.textContent=remaining;
  if(el_sold) el_sold.textContent=sold;

  const playerChanged=S.currentPlayer!==_lastRenderedPlayer;
  _lastRenderedPlayer=S.currentPlayer;

  if(S.currentPlayer){
    const p=S.players.find(pl=>pl.id===S.currentPlayer);
    if(!p) return;
    if(playerChanged){
      // Player identity
      document.getElementById('pres-img-wrap').innerHTML='<div class="pres-player-img-ph">🏏</div>';
      const nameEl=document.getElementById('pres-p-name');
      const numEl=document.getElementById('pres-p-num');
      const grpEl=document.getElementById('pres-p-group');
      if(numEl){numEl.textContent='PLAYER #'+p.displayOrder;numEl.className='pres-p-num anim-num';}
      if(grpEl){grpEl.textContent=p.category==='A'?'Group 1':p.category==='B'?'Group 2':'Group 3';}
      if(nameEl){nameEl.textContent=p.name.toUpperCase();nameEl.className='pres-p-name anim-name';}
      const re=document.getElementById('pres-role'),ie=document.getElementById('pres-info');
      if(re){re.textContent=p.role;re.className='pres-d-val anim-detail-1';}
      if(ie){ie.textContent=p.info!=='—'?p.info:'—';ie.className='pres-d-val anim-detail-2';}
      // Bid
      const bidEl=document.getElementById('pres-bid-num');
      const lbl=document.getElementById('pres-bid-lbl');
      if(lbl) lbl.textContent=p.sold?'Final Price':'Starting Bid';
      const target=p.sold?p.soldPrice:cfg.start;
      if(bidEl){bidEl.textContent=target.toLocaleString();triggerClass(bidEl,'anim-bid-pop',600);
        bidEl.classList.toggle('has-value',target>0);}
      const incEl=document.getElementById('pres-inc');
      if(incEl) incEl.textContent='Increment: '+cfg.inc.toLocaleString()+' pts';
      // Resolve images async
      if(typeof resolveAllImages==='function') resolveAllImages();
    }
    // Sold block
    const sb=document.getElementById('pres-sold-block');
    if(sb){
      if(p.sold){
        const wasHidden=sb.style.display==='none';
        sb.style.display='block';
        if(wasHidden&&!playerChanged){triggerSoldEffect();const bidEl=document.getElementById('pres-bid-num');if(bidEl){triggerClass(bidEl,'bid-sold-glow',1800);animateNumber(bidEl,cfg.start,p.soldPrice,700);bidEl.classList.add('has-value');}document.getElementById('pres-bid-lbl').textContent='Final Price';}
        const cap=S.captains.find(c=>c.id===p.soldTo);
        const te=document.getElementById('pres-sold-team');
        const se=document.getElementById('pres-sold-sub');
        if(!playerChanged||wasHidden){
          if(te){te.textContent=(cap?.teamName||'—').toUpperCase();te.className='pres-sold-team anim-sold-sweep';}
          if(se){se.textContent=p.soldPrice.toLocaleString()+' points · '+cap?.name;se.className='pres-sold-sub anim-sold-sub';}
          if(typeof resolveAllImages==='function') resolveAllImages();
        }
      } else { sb.style.display='none'; }
    }
  } else {
    // No player selected
    document.getElementById('pres-p-num').textContent='PLAYER #—';
    document.getElementById('pres-p-name').textContent='AWAITING';
    document.getElementById('pres-role').textContent='—';
    document.getElementById('pres-info').textContent='—';
    document.getElementById('pres-img-wrap').innerHTML='<div class="pres-player-img-ph">🏏</div>';
    const bidEl=document.getElementById('pres-bid-num');
    if(bidEl){bidEl.textContent=cfg.start.toLocaleString();bidEl.classList.remove('has-value');}
    const sb=document.getElementById('pres-sold-block');
    if(sb){sb.style.display='none';const lw=document.getElementById('pres-sold-logo-wrap');if(lw)lw.innerHTML='';}
    _lastRenderedPlayer=null;
  }

  // Budget strip
  const maxSlots=S.settings.teamSize-1;
  const strip=document.getElementById('pres-teams-strip');
  if(strip){
    strip.innerHTML=S.captains.map(c=>{
      const bal=c.budget-c.spent,col=bal<5000?'var(--red)':bal<15000?'var(--amber)':'var(--green)',pct=Math.round((c.players.length/maxSlots)*100);
      return `<div class="ptm"><div class="ptm-logo-slot" data-ptm-cap="${c.id}"></div><div style="flex:1;min-width:0;"><div class="ptm-name">${c.teamName}</div><div class="ptm-bal" style="color:${col};">${bal.toLocaleString()}</div><div class="ptm-bar"><div class="ptm-fill" style="width:${pct}%;background:${col};"></div></div></div></div>`;
    }).join('');
  }

  // Mini teams right panel
  const mini=document.getElementById('pres-mini-teams-list');
  if(mini){
    mini.innerHTML=S.captains.map(c=>{
      const bal=c.budget-c.spent,col=bal<5000?'var(--red)':bal<15000?'var(--amber)':'var(--green)',pct=Math.round((c.players.length/maxSlots)*100);
      return `<div class="pres-mini-team-row"><div class="pres-mini-logo" data-mini-cap="${c.id}" style="display:flex;align-items:center;justify-content:center;font-size:10px;">🏏</div><div style="flex:1;min-width:0;"><div class="pres-mini-name">${c.teamName}</div><div class="pres-mini-bar"><div class="pres-mini-fill" style="width:${pct}%;background:${col};"></div></div></div><div class="pres-mini-bal" style="color:${col};">${(bal/1000).toFixed(0)}k</div></div>`;
    }).join('');
  }

  renderSponsorBar();
  if(typeof resolveAllImages==='function') resolveAllImages();
}

function resolveImage(name){if(!name)return Promise.resolve(null);var key=name.toLowerCase().trim();if(key in _imgCache)return Promise.resolve(_imgCache[key]);var tries=[];[name,name.toLowerCase(),name.replace(/ /g,'_'),name.toLowerCase().replace(/ /g,'_')].forEach(function(v){IMAGE_EXTS.forEach(function(ext){tries.push('./images/'+encodeURIComponent(v)+'.'+ext);});});var i=0;function next(){if(i>=tries.length){_imgCache[key]=null;return Promise.resolve(null);}return fetch(tries[i++],{method:'HEAD'}).then(function(r){return r.ok?(_imgCache[key]=tries[i-1]):next();}).catch(next);}return next();}

function showTab(t) {
  ['setup','admin','presentation','teams'].forEach(function(id) {
    var el = document.getElementById('page-'+id);
    var tab = document.getElementById('tab-'+id);
    if (el) el.style.display = id===t ? 'block' : 'none';
    if (tab) {
      tab.classList.toggle('active', id===t);
    }
  });
  if (t==='admin') { renderAdmin(); }
  if (t==='presentation') { _lastRenderedPlayer=null; _lastRenderedCat=null; renderPres(); }
  if (t==='teams') { renderTeamsPage(); }
  if (t==='setup') { renderSponsorSlots(); renderTeamLogoManager(); }
}
